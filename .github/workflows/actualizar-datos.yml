name: Actualizar datos FEB

on:
  schedule:
    # Lunes a las 07:00 UTC (08:00/09:00 en España según horario)
    - cron: '0 7 * * 1'
  workflow_dispatch:   # y botón manual para lanzarlo cuando quieras

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Instalar dependencias
        run: npm ci

      # ----- Tercera FEB (competición 3, por defecto) -----
      - name: Tercera · scrapear
        run: node scraper/scrape.js --competicion 3
      - name: Tercera · calcular
        run: node scraper/calcular.js --competicion 3
      - name: Tercera · histórico
        run: node scraper/historico.js --competicion 3

      # ----- Segunda FEB (competición 2) -----
      - name: Segunda · scrapear
        run: node scraper/scrape.js --competicion 2
      - name: Segunda · calcular
        run: node scraper/calcular.js --competicion 2
      - name: Segunda · histórico
        run: node scraper/historico.js --competicion 2

      # ----- Primera FEB (competición 1) -----
      - name: Primera · scrapear
        run: node scraper/scrape.js --competicion 1
      - name: Primera · calcular
        run: node scraper/calcular.js --competicion 1
      - name: Primera · histórico
        run: node scraper/historico.js --competicion 1

      - name: Commit y push si hay cambios
        run: |
          git config user.name "pickandstats-bot"
          git config user.email "actions@github.com"
          git add data/
          if git diff --staged --quiet; then
            echo "Sin partidos nuevos esta semana."
          else
            git commit -m "Actualización automática de datos ($(date +%d/%m/%Y))"
            git push
          fi
