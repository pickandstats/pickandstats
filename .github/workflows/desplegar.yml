name: Desplegar web en GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24

      # ---- Sitio de contenido (Astro) -> raíz del dominio ----
      - name: Astro · instalar
        working-directory: site
        run: npm ci
      - name: Astro · compilar
        working-directory: site
        run: npm run build

      # ---- App de estadísticas (React) -> /app ----
      - name: App · instalar
        working-directory: web
        run: npm ci
      - name: Copiar datos procesados
        run: |
          mkdir -p web/public/data
          cp -r data/processed/. web/public/data/
      - name: App · compilar
        working-directory: web
        run: npm run build

      # ---- Ensamblar la salida final ----
      - name: Ensamblar
        run: |
          rm -rf _publish
          mkdir -p _publish/app
          cp -r site/dist/. _publish/
          cp -r web/dist/. _publish/app/
          echo "--- raíz ---"
          ls _publish
          echo "--- /app ---"
          ls _publish/app
          if [ -f _publish/CNAME ]; then
            echo "CNAME correcto: $(cat _publish/CNAME)"
          else
            echo "ERROR: falta el CNAME en la raíz, se perdería el dominio"
            exit 1
          fi

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _publish

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
